<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>
        Tính Toán Hàng Rào B40
    </title>

    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Inter, sans-serif;
        }

        body {
            background: #f5f5f7;
            padding: 20px;
        }

        .card {
            width: 100%;
            max-width: 1100px;
            margin: auto;
            background: #fff;
            border-radius: 24px;
            padding: 32px;
        }

        h2 {
            margin-bottom: 28px;
            font-size: 32px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group label {
            font-size: 14px;
            font-weight: 600;
            color: #222;
        }

        .input-group input {
            width: 100%;
            height: 52px;
            border: 1px solid #ddd;
            border-radius: 14px;
            padding: 0 16px;
            font-size: 15px;
            outline: none;
            transition: 0.2s;
        }

        .input-group input:focus {
            border-color: #000;
        }

        .export-btn {
            margin-top: 28px;
            width: 100%;
            height: 56px;
            border: none;
            border-radius: 16px;
            background: #000;
            color: white;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
        }

        .export-btn:hover {
            opacity: 0.9;
        }

        /* invoice */

        .invoice {
            margin-top: 40px;
            background: white;
            border-radius: 28px;
            padding: 40px;
            border: 1px solid #e5e7eb;
            overflow: hidden;
        }

        .invoice-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 20px;
            padding-bottom: 28px;
            border-bottom: 1px solid #eee;
        }

        .invoice-header h3 {
            font-size: 34px;
            font-weight: 700;
            word-break: break-word;
        }

        .invoice-body {
            padding: 30px 0;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .invoice-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
        }

        .invoice-row span {
            color: #666;
            font-size: 15px;
        }

        .invoice-row strong {
            font-size: 17px;
            text-align: right;
            word-break: break-word;
        }

        .invoice-footer {
            border-top: 1px solid #eee;
            padding-top: 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
        }

        .invoice-footer span {
            font-size: 18px;
            font-weight: 600;
        }

        .invoice-footer h2 {
            font-size: 40px;
            margin: 0;
            text-align: right;
            word-break: break-word;
        }

        /* Tablet */

        @media (max-width: 992px) {
            .grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .invoice {
                padding: 28px;
            }

            .invoice-header h3 {
                font-size: 28px;
            }

            .invoice-footer h2 {
                font-size: 32px;
            }
        }

        /* Mobile */

        @media (max-width: 768px) {
            body {
                padding: 14px;
            }

            .card {
                padding: 20px;
                border-radius: 20px;
            }

            h2 {
                font-size: 24px;
                margin-bottom: 22px;
            }

            .grid {
                grid-template-columns: 1fr;
            }

            .invoice {
                margin-top: 28px;
                padding: 22px;
                border-radius: 22px;
            }

            .invoice-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .invoice-header h3 {
                font-size: 24px;
            }

            .invoice-body {
                gap: 16px;
            }

            .invoice-row {
                flex-direction: column;
                align-items: flex-start;
            }

            .invoice-row strong {
                text-align: left;
                font-size: 16px;
            }

            .invoice-footer {
                flex-direction: column;
                align-items: flex-start;
            }

            .invoice-footer h2 {
                font-size: 28px;
                text-align: left;
            }

            .export-btn {
                height: 52px;
                font-size: 14px;
            }
        }

        /* Small mobile */

        @media (max-width: 480px) {
            .card {
                padding: 16px;
            }

            .invoice {
                padding: 18px;
            }

            .invoice-header h3 {
                font-size: 20px;
            }

            .invoice-footer h2 {
                font-size: 24px;
            }

            .input-group input {
                height: 48px;
                font-size: 14px;
            }
        }
    </style>
</head>

<body>
    <div class="card">
        <h2>
            Tính Toán Hàng Rào
            B40
        </h2>

        <div class="grid">
            <div class="input-group">
                <label>Chiều dài bên
                    trái (m)</label>

                <input type="number" id="leftLength" />
            </div>

            <div class="input-group">
                <label>Chiều dài bên
                    phải (m)</label>

                <input type="number" id="rightLength" />
            </div>

            <div class="input-group">
                <label>Chiều ngang đầu
                    (m)</label>

                <input type="number" id="topWidth" />
            </div>

            <div class="input-group">
                <label>Chiều ngang cuối
                    (m)</label>

                <input type="number" id="bottomWidth" />
            </div>

            <div class="input-group">
                <label>Giá công
                    mần</label>

                <input type="text" id="laborPrice" />
            </div>

            <div class="input-group">
                <label>Giá cột /
                    cây</label>

                <input type="text" id="columnPrice" />
            </div>

            <div class="input-group">
                <label>Khoảng cách cột
                    tối thiểu
                    (m)</label>

                <input type="number" step="0.1" id="columnDistance" />
            </div>

            <div class="input-group">
                <label>Cột góc cộng
                    thêm</label>

                <input type="number" id="extraColumns" />
            </div>

            <div class="input-group">
                <label id="meshLabel">Quy chuẩn theo
                    1m = 3kg</label>

                <input type="number" step="0.1" id="meshKgPerMeter" value="3" />
            </div>

            <div class="input-group">
                <label>Giá lưới /
                    kg</label>

                <input type="text" id="meshKgPrice" />
            </div>

            <div class="input-group">
                <label>Phát sinh
                    thêm</label>

                <input type="text" id="extraCost" value="0" />
            </div>
        </div>

        <button class="export-btn" onclick="exportImage()">
            Xuất hình ảnh
        </button>

        <!-- invoice -->

        <div class="invoice" id="invoice">
            <div class="invoice-header">
                <div>
                    <h3>
                        Fence Invoice
                    </h3>
                </div>

                <div>
                    <span>Invoice</span>

                    <h4 id="invoiceId">
                        #
                    </h4>
                </div>
            </div>

            <div class="invoice-body">
                <div class="invoice-row">
                    <span>Tổng chiều
                        dài</span>

                    <strong id="totalLength"></strong>
                </div>

                <div class="invoice-row">
                    <span>Tổng số
                        cột</span>

                    <strong id="totalColumns"></strong>
                </div>

                <div class="invoice-row">
                    <span>Tiền
                        cột</span>

                    <strong id="columnTotal"></strong>
                </div>

                <div class="invoice-row">
                    <span>Tổng kg
                        lưới</span>

                    <strong id="meshKg"></strong>
                </div>

                <div class="invoice-row">
                    <span>Tiền
                        lưới</span>

                    <strong id="meshTotal"></strong>
                </div>

                <div class="invoice-row">
                    <span>Giá
                        công</span>

                    <strong id="laborTotal"></strong>
                </div>

                <div class="invoice-row">
                    <span>Phát sinh
                        thêm</span>

                    <strong id="extraTotal"></strong>
                </div>
            </div>

            <div class="invoice-footer">
                <span>Tổng
                    Tiền</span>

                <h2 id="grandTotal"></h2>
            </div>
        </div>
    </div>

    <script>
        const inputs =
            document.querySelectorAll(
                'input'
            );

        document.getElementById(
            'invoiceId'
        ).innerText =
            '#' + Date.now();

        function toNumber(
            value
        ) {
            return Number(
                value || 0
            );
        }

        function formatCurrency(
            value
        ) {
            return (
                Number(
                    value
                ).toLocaleString(
                    'vi-VN'
                ) + 'đ'
            );
        }

        function formatInput(
            input
        ) {
            input.addEventListener(
                'input',
                (e) => {
                    const raw =
                        e.target.value.replace(
                            /\D/g,
                            ''
                        );

                    if (
                        !raw
                    ) {
                        e.target.value =
                            '';

                        calculate();

                        return;
                    }

                    e.target.value =
                        Number(
                            raw
                        ).toLocaleString(
                            'vi-VN'
                        );

                    calculate();
                }
            );
        }

        formatInput(
            document.getElementById(
                'laborPrice'
            )
        );

        formatInput(
            document.getElementById(
                'columnPrice'
            )
        );

        formatInput(
            document.getElementById(
                'meshKgPrice'
            )
        );

        formatInput(
            document.getElementById(
                'extraCost'
            )
        );

        inputs.forEach(
            (input) => {
                input.addEventListener(
                    'input',
                    calculate
                );
            }
        );

        function calculate() {
            const left =
                toNumber(
                    document.getElementById(
                        'leftLength'
                    ).value
                );

            const right =
                toNumber(
                    document.getElementById(
                        'rightLength'
                    ).value
                );

            const top =
                toNumber(
                    document.getElementById(
                        'topWidth'
                    ).value
                );

            const bottom =
                toNumber(
                    document.getElementById(
                        'bottomWidth'
                    ).value
                );

            const labor =
                toNumber(
                    document
                        .getElementById(
                            'laborPrice'
                        )
                        .value.replace(
                            /\./g,
                            ''
                        )
                );

            const column =
                toNumber(
                    document
                        .getElementById(
                            'columnPrice'
                        )
                        .value.replace(
                            /\./g,
                            ''
                        )
                );

            const distance =
                toNumber(
                    document.getElementById(
                        'columnDistance'
                    ).value
                );

            const extraColumns =
                toNumber(
                    document.getElementById(
                        'extraColumns'
                    ).value
                );

            const meshKgPerMeter =
                toNumber(
                    document.getElementById(
                        'meshKgPerMeter'
                    ).value
                );

            const meshPrice =
                toNumber(
                    document
                        .getElementById(
                            'meshKgPrice'
                        )
                        .value.replace(
                            /\./g,
                            ''
                        )
                );

            const extraCost =
                toNumber(
                    document
                        .getElementById(
                            'extraCost'
                        )
                        .value.replace(
                            /\./g,
                            ''
                        )
                );

            document.getElementById(
                'meshLabel'
            ).innerText =
                `Quy chuẩn theo 1m = ${meshKgPerMeter}kg`;

            const totalFenceLength =
                left +
                right +
                top +
                bottom;

            const baseColumns =
                distance > 0
                    ? Math.ceil(
                        totalFenceLength /
                        distance
                    )
                    : 0;

            const totalColumns =
                baseColumns +
                extraColumns;

            const totalColumnPrice =
                totalColumns *
                column;

            const totalMeshKg =
                totalFenceLength *
                meshKgPerMeter;

            const totalMeshPrice =
                totalMeshKg *
                meshPrice;

            const grandTotal =
                labor +
                totalColumnPrice +
                totalMeshPrice +
                extraCost;

            document.getElementById(
                'totalLength'
            ).innerText =
                totalFenceLength.toFixed(
                    2
                ) + 'm';

            document.getElementById(
                'totalColumns'
            ).innerText =
                totalColumns +
                ' cây';

            document.getElementById(
                'columnTotal'
            ).innerText =
                formatCurrency(
                    totalColumnPrice
                );

            document.getElementById(
                'meshKg'
            ).innerText =
                totalMeshKg.toFixed(
                    2
                ) + ' kg';

            document.getElementById(
                'meshTotal'
            ).innerText =
                formatCurrency(
                    totalMeshPrice
                );

            document.getElementById(
                'laborTotal'
            ).innerText =
                formatCurrency(
                    labor
                );

            document.getElementById(
                'extraTotal'
            ).innerText =
                formatCurrency(
                    extraCost
                );

            document.getElementById(
                'grandTotal'
            ).innerText =
                formatCurrency(
                    grandTotal
                );
        }

        async function exportImage() {
            const invoice =
                document.getElementById(
                    'invoice'
                );

            const canvas =
                await html2canvas(
                    invoice,
                    {
                        scale: 2,
                        backgroundColor:
                            '#ffffff',
                    }
                );

            const image =
                canvas.toDataURL(
                    'image/png'
                );

            const link =
                document.createElement(
                    'a'
                );

            link.href = image;

            link.download =
                'hoa-don-b40.png';

            link.click();
        }

        calculate();
    </script>
</body>

</html>
